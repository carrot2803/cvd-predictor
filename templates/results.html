<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen font-[Poppins]">
    <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4 max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Survey Results</h1>
        <p class="text-gray-700 text-lg text-center mb-4">Your heart disease probability is:</p>
        <div class="text-center">
            <span id="resultDisplay" class="text-4xl font-bold text-blue-600">--%</span>
        </div>
        <div class="mt-6 text-center">
            <a href="/" class="text-blue-500 hover:underline">Take another survey</a>
        </div>
    </div>

    <script>
        const result = sessionStorage.getItem("surveyResult");

        if (result !== null) {
            document.getElementById("resultDisplay").textContent = `${(result * 100).toFixed(2)}%`;
        } else {
            document.getElementById("resultDisplay").textContent = "No result available.";
        }
    </script>
</body>

</html>
