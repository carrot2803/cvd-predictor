{% block content %}

<form id="page-4" class="survey-page">
    <div class="section-label">MEDICAL HISTORY & CHRONIC CONDITIONS</div>

    <!-- Sensory Impairments -->
    <div class="yes-no-question">
        <label class="yes-no-question-label">
            Do you have any sensory impairments ?
        </label>
        <div class="yes-no-container">
            <label class="flex-1">
                <input type="radio" name="Sensory Impairments" value="Yes" required class="hidden peer">
                <div class="yes-no-option">
                    Yes
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="Sensory Impairments" value="No" class="hidden peer">
                <div class="yes-no-option">
                    No
                </div>
            </label>
        </div>
    </div>

    <!-- Had Arthritis -->
    <div class="yes-no-question">
        <label class="yes-no-question-label">
            Have you ever been diagnosed with Arthritis ?
        </label>
        <div class="yes-no-container">
            <label class="flex-1">
                <input type="radio" name="HadArthritis" value="Yes" required class="hidden peer">
                <div class="yes-no-option">
                    Yes
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="HadArthritis" value="No" class="hidden peer">
                <div class="yes-no-option">
                    No
                </div>
            </label>
        </div>
    </div>

    <!-- Have High Cholesterol -->
    <div class="yes-no-question">
        <label class="yes-no-question-label">
            Have you been diagnosed with High Cholesterol ?
        </label>
        <div class="yes-no-container">
            <label class="flex-1">
                <input type="radio" name="HaveHighCholesterol" value="Yes" required class="hidden peer">
                <div class="yes-no-option">
                    Yes
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="HaveHighCholesterol" value="No" class="hidden peer">
                <div class="yes-no-option">
                    No
                </div>
            </label>
        </div>
    </div>

    <!-- Vaccinated -->
    <div class="yes-no-question">
        <label class="yes-no-question-label">
            Are you vaccinated (e.g., for COVID-19, pneumonia, flu) ?
        </label>
        <div class="yes-no-container">
            <label class="flex-1">
                <input type="radio" name="Vaccinated" value="Yes" required class="hidden peer">
                <div class="yes-no-option">
                    Yes
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="Vaccinated" value="No" class="hidden peer">
                <div class="yes-no-option">
                    No
                </div>
            </label>
        </div>
    </div>

    <div class="navigation-section">
        <div class="nav-btn">
            <button type="button" class="back-btn">
                Back
            </button>
        </div>
        <div class="status-bar">
            4 of 5
        </div>
        <div class="nav-next-btn">
            <button type="submit" class="next-btn">
                Next
            </button>
        </div>
    </div>
</form>

{% endblock %}
