{% block content %}

<form id="page-1" class="survey-page">
    <div class="section-label">DEMOGRAPHICS AND GENERAL HEALTH</div>
    <div class="multi-question-row">
        <!-- Sex -->
        <div class="mb-4 md:w-1/2">
            <label for="Sex" class="general-question-label">Sex</label>
            <select id="Sex" name="Sex" required class="selection-options">
                <option value="">Select Sex</option>
                <option value=1>Male</option>
                <option value=0>Female</option>
            </select>
        </div>

        <!-- Age Category -->
        <div class="mb-4 md:w-1/2">
            <label for="AgeCategory" class="general-question-label">Age</label>
            <input type="number" id="AgeCategory" name="AgeCategory" min="18" max="400" required placeholder="e.g., 18"
                class="numeric-options" />
        </div>
    </div>
    <div class="multi-question-row">
        <!-- Height in Feet & Inches -->
        <div class="mb-4 md:w-2/3">
            <label for="HeightFeet" class="general-question-label">Height (Feet & Inches)</label>
            <div class="flex space-x-4">
                <input type="number" id="HeightFeet" name="HeightFeet" min="0" required placeholder="Feet"
                    class="numeric-options" />
                <input type="number" id="HeightInches" name="HeightInches" min="0" max="11" required
                    placeholder="Inches" class="numeric-options" />
            </div>
        </div>

        <!-- Weight in Pounds -->
        <div class="mb-4 md:w-1/3">
            <label for="WeightPounds" class="general-question-label">Weight (lbs)</label>
            <input type="number" id="WeightPounds" name="WeightPounds" required step="0.1" min="0"
                placeholder="e.g., 150" class="numeric-options" />
        </div>

    </div>

    <!-- Last Checkup Time -->
    <div class="mb-4">
        <label for="LastCheckupTime" class="general-question-label">When was your last checkup?</label>
        <select id="LastCheckupTime" name="LastCheckupTime" required class="selection-options">
            <option value="">Select Time Frame</option>
            <option value=1>Less than a year</option>
            <option value=2>1-2 years</option>
            <option value=3>More than 2 years</option>
            <option value=4>Never</option>
        </select>
    </div>

    <div class="navigation-section">
        <div class="nav-btn"></div>
        <div class="status-bar">
            1 of 5
        </div>
        <div class="nav-next-btn">
            <button type="submit" class="next-btn">
                Next
            </button>
        </div>
    </div>
</form>

{% endblock %}
