{% block content %}

<div class="mb-4 flex flex-col sm:flex-row sm:items-center justify-between sm:space-x-3">
    <label class="block text-gray-700 text-md mb-2 sm:mb-0 w-full text-left sm:w-4/5">
        {{ question.label|safe }}
    </label>
    <div class="flex gap-4 sm:w-1/5">
        <label class="flex-1">
            <input type="radio" name="{{ question.id }}" value="Yes" class="hidden peer" required>
            <div
                class="w-full py-1 px-3 border-2 border-gray-200 rounded-lg text-center font-medium cursor-pointer peer-checked:bg-sky-500 peer-checked:text-white peer-checked:border-sky-500 hover:bg-sky-500 hover:text-white hover:border-sky-500">
                Yes</div>
        </label>
        <label class="flex-1">
            <input type="radio" name="{{ question.id }}" value="No" class="hidden peer">
            <div
                class="w-full py-1 px-3 border-2 border-gray-200 rounded-lg text-center font-medium cursor-pointer peer-checked:bg-sky-500 peer-checked:text-white peer-checked:border-sky-500 hover:bg-sky-500 hover:text-white hover:border-sky-500">
                No</div>
        </label>
    </div>
</div>

{% endblock %}
